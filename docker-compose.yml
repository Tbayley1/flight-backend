version: '3.8'

services:
  # 1. Message Broker
  kafka:
    image: bitnamilegacy/kafka:3.9
    healthcheck:
      test: [ "CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - flight-network

  # 2. Processing Brain
  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
    networks:
      - flight-network

  # 3. data Ingestor (The Producer)
  flight-ingestor:
    build: ./ingestor
    container_name: flight-ingestor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    networks:
      - flight-network

  flight-processor:
    build: ./processor
    container_name: spark-processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # These two lines fix the "basedir must be absolute" error
      - SPARK_USER=spark
      - HOME=/tmp
    command: >
      spark-submit 
      --conf "spark.jars.ivy=/tmp/.ivy2"
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.2
      /app/spark_job.py

    volumes:
      - ./processor/spark_job.py:/app/spark_job.py
    networks:
      - flight-network

  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flight_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flight-network

volumes:
    postgres_data:

networks:
  flight-network:
    driver: bridge